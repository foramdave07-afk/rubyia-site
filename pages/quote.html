
<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Quotation | RubyIA</title>
  <link rel="stylesheet" href="/assets/styles.css"/>
</head>
<body>
  <div class="container">
    <div class="section">
      <h2 style="margin:0 0 .6rem">Send Quotation (Excel → PDF)</h2>
      <div class="notice">
        Upload your Excel quotation (e.g., <b>.xlsx</b> or <b>.xlsm</b>) that already contains your logo and formatting. We will convert it to a PDF on the server and email it to the recipient.
      </div>
      <form id="excelSendForm" class="upload">
        <div class="row"><label>Excel file</label><input type="file" id="xf" name="file" accept=".xlsx,.xlsm,.xls" required/></div>
        <div class="row"><label>To (recipient)</label><input id="to" name="to" type="email" required placeholder="customer@example.com"/></div>
        <div class="row"><label>Subject</label><input id="subject" name="subject" placeholder="Quotation"/></div>
        <div class="row"><label>From (optional)</label><input id="from" name="from" placeholder="defaults to verified sender"/></div>
        <div class="row"><label>Reply‑To (optional)</label><input id="replyTo" name="replyTo" placeholder="defaults to verified sender"/></div>
        <div class="quo-actions">
          <button type="submit" class="btn primary">Send PDF via Email</button>
          <button type="button" id="btn_download_pdf" class="btn">Download PDF only</button>
          <a class="btn" href="/">Back to Catalog</a>
        </div>
      </form>
      <div id="status" class="notice hidden"></div>
    </div>
  </div>
  <script src="/assets/quote-upload.js"></script>
</body>
</html>
